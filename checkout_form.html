<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AS Otel Çeşme — Check-out Anketi</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f5f4f0;
    --surface: #ffffff;
    --border: #e2e0d8;
    --text: #1a1a1a;
    --muted: #888880;
    --accent: #40598e;
    --accent-light: #eef1f8;
    --green: #2d7d4f;
    --green-light: #edf7f2;
    --red: #c0392b;
    --red-light: #fdf0ee;
    --font: 'DM Sans', sans-serif;
    --mono: 'DM Mono', monospace;
  }

  body {
    font-family: var(--font);
    background: var(--bg);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 2rem 1rem;
  }

  .header {
    width: 100%;
    max-width: 480px;
    margin-bottom: 1.5rem;
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .hotel-logo {
    width: 42px;
    height: 42px;
    background: var(--accent);
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: white;
    font-size: 18px;
  }

  .hotel-name {
    font-size: 15px;
    font-weight: 600;
    color: var(--text);
  }

  .hotel-sub {
    font-size: 12px;
    color: var(--muted);
    font-family: var(--mono);
  }

  .card {
    width: 100%;
    max-width: 480px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 2rem;
  }

  .card-title {
    font-size: 18px;
    font-weight: 600;
    color: var(--text);
    margin-bottom: 4px;
  }

  .card-sub {
    font-size: 13px;
    color: var(--muted);
    margin-bottom: 1.75rem;
  }

  .field {
    margin-bottom: 1.25rem;
  }

  label {
    display: block;
    font-size: 12px;
    font-weight: 500;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.05em;
    font-family: var(--mono);
    margin-bottom: 6px;
  }

  input, select {
    width: 100%;
    padding: 10px 14px;
    border: 1px solid var(--border);
    border-radius: 8px;
    font-size: 14px;
    font-family: var(--font);
    color: var(--text);
    background: var(--bg);
    outline: none;
    transition: border-color 0.15s, background 0.15s;
  }

  input:focus, select:focus {
    border-color: var(--accent);
    background: white;
  }

  .phone-wrap {
    display: flex;
    gap: 8px;
  }

  .phone-prefix {
    width: 80px;
    flex-shrink: 0;
    text-align: center;
    font-family: var(--mono);
    font-size: 13px;
  }

  .divider {
    height: 1px;
    background: var(--border);
    margin: 1.5rem 0;
  }

  .delay-label {
    font-size: 13px;
    color: var(--text);
    margin-bottom: 10px;
    font-weight: 500;
  }

  .delay-options {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }

  .delay-btn {
    padding: 6px 14px;
    border: 1px solid var(--border);
    border-radius: 20px;
    font-size: 12px;
    font-family: var(--mono);
    cursor: pointer;
    background: var(--bg);
    color: var(--muted);
    transition: all 0.15s;
  }

  .delay-btn.active {
    background: var(--accent);
    border-color: var(--accent);
    color: white;
  }

  .submit-btn {
    width: 100%;
    padding: 12px;
    background: var(--accent);
    color: white;
    border: none;
    border-radius: 10px;
    font-size: 15px;
    font-weight: 500;
    font-family: var(--font);
    cursor: pointer;
    margin-top: 1.5rem;
    transition: opacity 0.15s, transform 0.1s;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }

  .submit-btn:hover { opacity: 0.9; }
  .submit-btn:active { transform: scale(0.99); }
  .submit-btn:disabled { opacity: 0.5; cursor: not-allowed; }

  .wa-icon {
    width: 18px;
    height: 18px;
    fill: white;
  }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 2rem;
    left: 50%;
    transform: translateX(-50%) translateY(100px);
    padding: 12px 20px;
    border-radius: 10px;
    font-size: 14px;
    font-weight: 500;
    display: flex;
    align-items: center;
    gap: 8px;
    transition: transform 0.3s ease;
    z-index: 100;
    white-space: nowrap;
  }

  .toast.show { transform: translateX(-50%) translateY(0); }
  .toast.success { background: var(--green); color: white; }
  .toast.error { background: var(--red); color: white; }

  /* Recent list */
  .recent {
    width: 100%;
    max-width: 480px;
    margin-top: 1.25rem;
  }

  .recent-title {
    font-size: 11px;
    font-family: var(--mono);
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.05em;
    margin-bottom: 8px;
    padding-left: 4px;
  }

  .recent-list {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .recent-item {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 14px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    font-size: 13px;
  }

  .recent-name { font-weight: 500; color: var(--text); }
  .recent-meta { font-size: 11px; color: var(--muted); font-family: var(--mono); margin-top: 1px; }
  .recent-status { font-size: 11px; font-family: var(--mono); padding: 2px 8px; border-radius: 10px; }
  .status-sent { background: var(--accent-light); color: var(--accent); }
  .status-queued { background: #fef9e7; color: #b7860b; }
</style>
</head>
<body>

<div class="header">
  <div class="hotel-logo">🏨</div>
  <div>
    <div class="hotel-name">AS Otel Çeşme</div>
    <div class="hotel-sub">Anket Gönderme Paneli</div>
  </div>
</div>

<div class="card">
  <div class="card-title">Check-out Anketi Gönder</div>
  <div class="card-sub">Misafir bilgilerini girin, WhatsApp mesajı otomatik gönderilir.</div>

  <div class="field">
    <label>Misafir Adı Soyadı</label>
    <input type="text" id="name" placeholder="Halil ibrahim Çayır" autocomplete="off">
  </div>

  <div class="field">
    <label>Telefon Numarası</label>
    <div class="phone-wrap">
      <input class="phone-prefix" type="text" id="prefix" value="+90" readonly>
      <input type="tel" id="phone" placeholder="532 123 45 67" autocomplete="off">
    </div>
  </div>

  <div class="field">
    <label>Oda Numarası</label>
    <input type="text" id="room" placeholder="101" autocomplete="off">
  </div>

  <div class="field">
    <label>Dil</label>
    <select id="language">
      <option value="tr">🇹🇷 Türkçe</option>
      <option value="en">🇬🇧 English</option>
      <option value="de">🇩🇪 Deutsch</option>
      <option value="ru">🇷🇺 Русский</option>
    </select>
  </div>

  <div class="divider"></div>

  <div class="delay-label">Mesaj Ne Zaman Gönderilsin?</div>
  <div class="delay-options">
    <button class="delay-btn active" data-val="0">Hemen</button>
    <button class="delay-btn" data-val="30">30 dk sonra</button>
    <button class="delay-btn" data-val="60">1 saat sonra</button>
    <button class="delay-btn" data-val="120">2 saat sonra</button>
  </div>

  <button class="submit-btn" onclick="sendSurvey()" id="sendBtn">
    <svg class="wa-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
      <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413Z"/>
    </svg>
    WhatsApp Anketi Gönder
  </button>
</div>

<!-- Son gönderimler -->
<div class="recent" id="recentSection" style="display:none">
  <div class="recent-title">Son Gönderimler</div>
  <div class="recent-list" id="recentList"></div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
  const API_URL = 'http://127.0.0.1:8000';
  let selectedDelay = 0;
  let recentItems = [];

  // Delay butonları
  document.querySelectorAll('.delay-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.delay-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      selectedDelay = parseInt(btn.dataset.val);
    });
  });

  function showToast(msg, type) {
    const t = document.getElementById('toast');
    t.textContent = type === 'success' ? '✓ ' + msg : '✕ ' + msg;
    t.className = 'toast ' + type + ' show';
    setTimeout(() => t.classList.remove('show'), 3500);
  }

  function formatPhone(raw) {
    let p = raw.replace(/\D/g, '');
    if (p.startsWith('0')) p = p.slice(1);
    return '+90' + p;
  }

  async function sendSurvey() {
    const name  = document.getElementById('name').value.trim();
    const phone = document.getElementById('phone').value.trim();
    const room  = document.getElementById('room').value.trim();
    const lang  = document.getElementById('language').value;

    if (!name || !phone || !room) {
      showToast('Lütfen tüm alanları doldurun.', 'error');
      return;
    }

    const btn = document.getElementById('sendBtn');
    btn.disabled = true;
    btn.innerHTML = '<span style="opacity:.7">Gönderiliyor...</span>';

    const payload = {
      guest_name: name,
      phone: formatPhone(phone),
      room_number: room,
      checkout_at: new Date().toISOString(),
      language: lang,
      delay_minutes: selectedDelay
    };

    try {
      const res = await fetch(API_URL + '/api/surveys/trigger', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      });

      if (res.ok) {
        const data = await res.json();
        const delayText = selectedDelay === 0 ? 'Az önce' : selectedDelay + ' dk sonra';
        showToast(name + ' için anket gönderildi!', 'success');
        addRecent(name, room, formatPhone(phone), delayText);
        // Formu temizle
        document.getElementById('name').value = '';
        document.getElementById('phone').value = '';
        document.getElementById('room').value = '';
      } else {
        const err = await res.json();
        showToast('Hata: ' + (err.detail || 'Bir sorun oluştu.'), 'error');
      }
    } catch (e) {
      showToast('Sunucuya bağlanılamadı. Backend çalışıyor mu?', 'error');
    }

    btn.disabled = false;
    btn.innerHTML = `<svg class="wa-icon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413Z"/></svg> WhatsApp Anketi Gönder`;
  }

  function addRecent(name, room, phone, delay) {
    recentItems.unshift({ name, room, phone, delay });
    if (recentItems.length > 5) recentItems.pop();
    renderRecent();
  }

  function renderRecent() {
    const section = document.getElementById('recentSection');
    const list = document.getElementById('recentList');
    section.style.display = 'block';
    list.innerHTML = recentItems.map(item => `
      <div class="recent-item">
        <div>
          <div class="recent-name">${item.name} · Oda ${item.room}</div>
          <div class="recent-meta">${item.phone}</div>
        </div>
        <span class="recent-status ${item.delay === 'Az önce' ? 'status-sent' : 'status-queued'}">
          ${item.delay === 'Az önce' ? 'Gönderildi' : item.delay}
        </span>
      </div>
    `).join('');
  }
</script>
</body>
</html>
